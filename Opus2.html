<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Opus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Annapurna+SIL&family=IBM+Plex+Mono:wght@400;700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <style>
    /* =============================================================================
   Base
============================================================================= */

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #FFF8E5;
      color: #000000;
      min-height: 100vh;
    }

    /* =============================================================================
   Structure
============================================================================= */

    .app {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    .nav {
      display: flex;
      flex-direction: column;
      width: 240px;
      flex-shrink: 0;
      border-right: 2px solid rgba(0, 0, 0, 0.15);
      background: #ffffff;
      padding: 2rem 0;
    }

    .nav-logo {
      font-family: 'Annapurna SIL', serif;
      font-size: 2rem;
      font-weight: bold;
      color: #FF1A1A;
      padding: 0 2rem 1.5rem 2rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.15);
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
    }

    .nav-tab {
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
      padding: 1rem 2rem;
      cursor: pointer;
      color: rgba(0, 0, 0, 0.4);
      border-left: 4px solid transparent;
      user-select: none;
      transition: color 0.15s ease, border-left-color 0.15s ease;
    }

    .nav-tab.active {
      color: #FF1A1A;
      font-weight: 700;
      border-left-color: #FF1A1A;
    }

    .nav-tab:hover:not(.active) {
      color: #FF1A1A;
    }

    .view {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3rem;
      padding-bottom: 140px;
    }

    .view.hidden {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 2rem;
      align-items: start;
    }

    /* =============================================================================
   Composants et Cartes
============================================================================= */

    .widget-card {
      border: 2px solid rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      background: #ffffff;
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      height: max-content;
      position: relative;
      cursor: pointer;
    }

    .widget-card:hover {
      box-shadow: -10px 10px 0px 0px rgba(0, 0, 0, 0.18);
      transform: translateY(-2px);
    }

    .widget-card input,
    .widget-card textarea,
    .widget-card button,
    .widget-card .widget-color-dot,
    .widget-card .color-picker-pop {
      cursor: default;
    }

    .widget-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.25rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.15);
      background: #ffffff;
    }

    .widget-color-dot {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .widget-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #000000;
    }

    .widget-actions {
      display: flex;
      gap: 8px;
    }

    .widget-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #000000;
      font-size: 16px;
      transition: color 0.15s ease;
    }

    .widget-btn:hover {
      color: #FF1A1A;
    }

    .widget-body {
      padding: 1.5rem;
    }

    .color-picker-pop {
      position: absolute;
      top: 50px;
      left: 12px;
      z-index: 105;
      background: #ffffff;
      border: 2px solid rgba(0, 0, 0, 0.15);
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      padding: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      width: 120px;
    }

    .color-picker-pop.open {
      display: flex;
    }

    .color-swatch {
      width: 22px;
      height: 22px;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .color-swatch:hover {
      border: 2px solid #000000;
    }

    /* =============================================================================
   Tableaux et Formulaires
============================================================================= */

    table.task-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    table.task-table th {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(0, 0, 0, 0.4);
      font-weight: 700;
      text-align: left;
      padding: 8px;
      border-bottom: 2px solid rgba(0, 0, 0, 0.15);
    }

    table.task-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      vertical-align: middle;
    }

    .task-input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: #000000;
      font-family: 'Plus Jakarta Sans', sans-serif;
      width: 100%;
      transition: border-bottom 0.15s ease;
    }

    .task-input:focus {
      border-bottom: 1px solid #FF1A1A;
    }

    .add-row-btn {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #FF1A1A;
      cursor: pointer;
      padding: 8px 0;
      margin-top: 12px;
      border: none;
      background: none;
      font-weight: bold;
    }

    .add-row-btn:hover {
      text-decoration: underline;
    }

    .task-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #FF1A1A;
    }

    .text-widget-area {
      width: 100%;
      min-height: 120px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #000000;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.65;
    }

    /* =============================================================================
   Interface d'outils
============================================================================= */

    .toolbar {
      position: fixed;
      bottom: 40px;
      left: calc(240px + (100vw - 240px) / 2);
      transform: translateX(-50%);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 1rem 2rem;
      z-index: 10;
    }

    .add-btn {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #FF1A1A;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .add-btn:hover {
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.25);
    }

    .add-btn.primary {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #FF1A1A;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .add-btn.primary:hover {
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.4);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 5rem 2rem;
      color: rgba(0, 0, 0, 0.4);
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    .empty-state i {
      font-size: 48px;
      color: #FF1A1A;
      opacity: 0.8;
    }

    /* =============================================================================
   Calendrier
============================================================================= */

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .cal-title {
      font-family: 'Annapurna SIL', serif;
      font-size: 2.5rem;
      font-weight: 400;
      color: #000000;
    }

    .cal-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 2.5rem;
    }

    .cal-nav-btn {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #FF1A1A;
      transition: box-shadow 0.15s ease;
    }

    .cal-nav-btn:hover {
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.25);
    }

    .cal-nav-btn.today-btn {
      color: #111111;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: rgba(0, 0, 0, 0.15);
      border: 2px solid rgba(0, 0, 0, 0.15);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.1);
    }

    .cal-day-name {
      background: #ffffff;
      padding: 14px 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(0, 0, 0, 0.4);
      border-bottom: 2px solid rgba(0, 0, 0, 0.15);
    }

    .cal-day {
      background: #ffffff;
      padding: 12px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cal-day.other-month {
      background: rgba(0, 0, 0, 0.02);
    }

    .cal-day.other-month .cal-day-num {
      color: rgba(0, 0, 0, 0.25);
    }

    .cal-day-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 6px;
    }

    .cal-day.today .cal-day-num {
      display: inline-block;
      background: #FF1A1A;
      color: #ffffff;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .cal-task-chip {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      padding: 4px 6px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-left: 4px solid #000000;
      background: #ffffff;
      color: #000000;
      font-weight: 600;
      border-radius: 2px;
    }

    /* =============================================================================
   Modale Overlay & Edition
============================================================================= */

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-container {
      background: #FFF8E5;
      border: 2px solid #000000;
      box-shadow: -10px 10px 0px 0px rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      width: 600px;
      max-width: 90%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.open .overlay-container {
      transform: scale(1);
    }

    .overlay-toolbar {
      background: #ffffff;
      border-bottom: 2px solid rgba(0, 0, 0, 0.15);
      padding: 1rem;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .overlay-body {
      padding: 2rem;
      overflow-y: auto;
      max-height: 60vh;
    }

    .overlay-footer {
      background: transparent;
      border-top: 2px solid rgba(0, 0, 0, 0);
      padding: 1rem 2rem;
      display: flex;
      justify-content: flex-end;
      gap: 16px;
    }

    .footer-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      padding: 0.5rem 1.5rem;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: pointer;
      background: white;
      transition: box-shadow 0.15s ease;
    }

    .footer-btn.save {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.15);
    }

    .footer-btn.save:hover {
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.3);
    }

    .footer-btn.cancel {
      color: #FF1A1A;
      box-shadow: -4px 4px 0px 0px rgba(0, 0, 0, 0.1);
    }

    .footer-btn.cancel:hover {
      box-shadow: -6px 6px 0px 0px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <div class="app" id="app">
    <nav class="nav">
      <div class="nav-logo">Opus</div>
      <div class="nav-tab active" onclick="switchTab('dashboard',this)">Tableau de bord</div>
      <div class="nav-tab" onclick="switchTab('calendar',this)">Calendrier</div>
    </nav>

    <div class="view" id="view-dashboard">
      <div class="grid" id="widget-grid">
        <div class="empty-state" id="empty-hint" style="grid-column:1/-1">
          <i class="ti ti-layout-cards" aria-hidden="true"></i>
          <p>AUCUN WIDGET.<br>Ajoutez un tableau ou un bloc de texte.</p>
        </div>
      </div>
    </div>

    <div class="view hidden" id="view-calendar">
      <div class="cal-header">
        <div class="cal-title" id="cal-title"></div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-controls">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)">Précédent</button>
        <button class="cal-nav-btn today-btn" onclick="goToToday()">Aujourd'hui</button>
        <button class="cal-nav-btn" onclick="shiftMonth(1)">Suivant</button>
      </div>
    </div>

    <div class="toolbar">
      <button class="add-btn primary" onclick="openAddModal()">+ AJOUTER UN ELEMENT</button>
    </div>
  </div>

  <div class="overlay" id="widget-overlay">
    <div class="overlay-container">
      <div class="overlay-toolbar">
        <button class="add-btn" id="modal-toggle-table" onclick="changeModalWidgetType('table')">TABLEAU</button>
        <button class="add-btn" id="modal-toggle-text" onclick="changeModalWidgetType('text')">TEXTE</button>
      </div>
      <div class="overlay-body">
        <div id="modal-widget-preview"></div>
      </div>
      <div class="overlay-footer">
        <button class="footer-btn cancel" onclick="closeModal(false)">Annuler</button>
        <button class="footer-btn save" onclick="closeModal(true)">Sauvegarder</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="detail-overlay">
    <div class="overlay-container" style="width: 1000px; max-width: 95%;">
      <div class="overlay-header"
        style="background: #ffffff; border-bottom: 2px solid rgba(0, 0, 0, 0.15); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;">
        <span
          style="font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(0,0,0,0.5);">Aperçu
          détaillé</span>
        <button class="footer-btn save" onclick="closeDetailModal(true)">Enregistrer</button>
      </div>
      <div class="overlay-body" style="max-height: 75vh;">
        <div id="detail-widget-preview"></div>
      </div>
    </div>
  </div>

  <script>
    /* === ETAT === */
    const COLORS = ['#FF1A1A', '#111111', '#FF7F00', '#00FF00', '#00FFFF', '#0000FF', '#4B0082', '#9400D3'];
    let widgets = [];
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();
    let widgetCounter = 0;

    let currentModalWidget = null;

    /* === UTILITAIRES === */
    function getAllTasks() {
      const tasks = [];
      widgets.forEach(w => {
        if (w.type === 'table') {
          w.rows.forEach(r => {
            if (r.date && r.task) {
              tasks.push({ task: r.task, date: r.date, done: r.done, color: w.color, member: r.member });
            }
          });
        }
      });
      return tasks;
    }

    function resizeTextarea(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    /* === MODALE / OVERLAY === */
    function openAddModal() {
      const id = widgetCounter + 1;
      const color = COLORS[(id - 1) % COLORS.length];

      currentModalWidget = {
        id: id,
        type: 'table',
        color: color,
        title: 'TABLEAU ' + id,
        rows: [{ task: '', desc: '', member: '', date: '', done: false }]
      };

      document.getElementById('widget-overlay').classList.add('open');
      renderModalPreview();
    }

    function changeModalWidgetType(type) {
      if (!currentModalWidget || currentModalWidget.type === type) return;

      currentModalWidget.type = type;
      currentModalWidget.title = type === 'table' ? 'TABLEAU ' + currentModalWidget.id : 'NOTE ' + currentModalWidget.id;

      if (type === 'table') {
        currentModalWidget.rows = [{ task: '', desc: '', member: '', date: '', done: false }];
        delete currentModalWidget.text;
      } else {
        currentModalWidget.text = '';
        delete currentModalWidget.rows;
      }

      renderModalPreview();
    }

    function renderModalPreview() {
      const container = document.getElementById('modal-widget-preview');
      const btnTable = document.getElementById('modal-toggle-table');
      const btnText = document.getElementById('modal-toggle-text');

      if (currentModalWidget.type === 'table') {
        btnTable.classList.add('primary');
        btnText.classList.remove('primary');
      } else {
        btnText.classList.add('primary');
        btnTable.classList.remove('primary');
      }

      container.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'widget-card';
      card.style.boxShadow = 'none';
      card.innerHTML = buildWidgetHTML(currentModalWidget, true);
      container.appendChild(card);

      const textarea = card.querySelector('.text-widget-area');
      if (textarea) {
        setTimeout(() => resizeTextarea(textarea), 0);
      }
    }

    function closeModal(save) {
      if (save && currentModalWidget) {
        widgetCounter++;
        widgets.push(currentModalWidget);
        renderWidgets();
        renderCalendar();
      }
      currentModalWidget = null;
      document.getElementById('widget-overlay').classList.remove('open');
    }

    /* === WIDGETS === */
    function removeWidget(id) {
      widgets = widgets.filter(w => w.id !== id);
      renderWidgets();
      renderCalendar();
    }

    function renderWidgets() {
      const grid = document.getElementById('widget-grid');
      const hint = document.getElementById('empty-hint');

      widgets.forEach(w => {
        let el = document.querySelector(`[data-id="${w.id}"]`);
        if (!el) {
          el = document.createElement('div');
          el.className = 'widget-card';
          el.dataset.id = w.id;
          grid.appendChild(el);
        }

        el.innerHTML = buildWidgetHTML(w, 'grid');

        el.onclick = (e) => {
          if (e.target.closest('input, textarea, button, .widget-color-dot, .color-picker-pop')) return;
          openDetailOverlay(w.id);
        };

        const textarea = el.querySelector('.text-widget-area');
        if (textarea) {
          setTimeout(() => resizeTextarea(textarea), 0);
        }
      });

      [...grid.querySelectorAll('.widget-card')].forEach(el => {
        if (!widgets.find(w => w.id == el.dataset.id)) el.remove();
      });

      hint.style.display = widgets.length ? 'none' : 'flex';
    }

    function buildWidgetHTML(w, mode = 'grid') {
      if (mode === true) mode = 'modal';
      if (mode === false) mode = 'grid';
      const suffix = mode === 'grid' ? '' : `-${mode}`;

      const changeTitleAction = mode === 'modal' ? `updateModalTitle(this.value)` :
        mode === 'detail' ? `updateDetailTitle(this.value)` :
          `setTitle(${w.id},this.value)`;

      const removeAction = (mode === 'modal' || mode === 'detail') ? ` ` :
        `<button class="widget-btn" onclick="removeWidget(${w.id})"><i class="ti ti-x" aria-hidden="true"></i></button>`;

      const maximizeAction = mode === 'grid' ? `<button class="widget-btn" onclick="openDetailOverlay(${w.id})"><i class="ti ti-maximize" aria-hidden="true"></i></button>` : ``;

      const header = `<div class="widget-header">
    <div class="widget-color-dot" style="background:${w.color}" onclick="toggleColorPicker('${w.id}${suffix}')"></div>
    <div class="color-picker-pop" id="cp-${w.id}${suffix}">${COLORS.map(c => `<div class="color-swatch" style="background:${c}" onclick="setWidgetColor('${w.id}', '${c}', '${mode}')"></div>`).join('')}</div>
    <input class="widget-title" value="${w.title}" onchange="${changeTitleAction}" />
    <div class="widget-actions">
      ${maximizeAction}
      ${removeAction}
    </div>
  </div>`;

      if (w.type === 'table') {
        const rows = w.rows.map((r, i) => `<tr>
      <td><input type="checkbox" class="task-checkbox" ${r.done ? 'checked' : ''} onchange="updateRowData(${w.id},${i},'done',this.checked, '${mode}')"></td>
      <td><input class="task-input" value="${r.task || ''}" placeholder="Tâche" onchange="updateRowData(${w.id},${i},'task',this.value, '${mode}')"></td>
      <td><input class="task-input" value="${r.desc || ''}" placeholder="Description" onchange="updateRowData(${w.id},${i},'desc',this.value, '${mode}')"></td>
      <td><input class="task-input" value="${r.member || ''}" placeholder="Membre" onchange="updateRowData(${w.id},${i},'member',this.value, '${mode}')"></td>
      <td><input class="task-input" type="date" value="${r.date || ''}" style="width:110px" onchange="updateRowData(${w.id},${i},'date',this.value, '${mode}')"></td>
    </tr>`).join('');
        return `${header}<div class="widget-body">
      <table class="task-table">
        <tbody id="rows-${w.id}${suffix}">${rows}</tbody>
      </table>
      <button class="add-row-btn" onclick="addNewRow(${w.id}, '${mode}')">+ Ligne</button>
    </div>`;
      } else {
        const updateTextAction = mode === 'modal' ? `updateModalText(this.value)` :
          mode === 'detail' ? `updateDetailText(this.value)` :
            `updateText(${w.id},this.value)`;
        return `${header}<div class="widget-body">
      <textarea class="text-widget-area" placeholder="Texte..." oninput="resizeTextarea(this); ${updateTextAction}">${w.text || ''}</textarea>
    </div>`;
      }
    }

    /* === STYLES INTERACTIFS === */
    function updateWidgetStyle(w) {
      const dot = document.querySelector(`[data-id="${w.id}"] .widget-color-dot`);
      if (dot) dot.style.background = w.color;
    }

    function setWidgetColor(id, color, mode) {
      if (mode === true || mode === 'modal') {
        currentModalWidget.color = color;
        renderModalPreview();
      } else if (mode === 'detail') {
        currentDetailWidget.color = color;
        renderDetailPreview();
      } else {
        const w = widgets.find(x => x.id == id);
        if (w) { w.color = color; updateWidgetStyle(w); renderCalendar(); }
        toggleColorPicker(id);
      }
    }

    function toggleColorPicker(idStr) {
      const el = document.getElementById('cp-' + idStr);
      if (!el) return;
      const isOpen = el.classList.contains('open');
      document.querySelectorAll('.color-picker-pop.open').forEach(e => e.classList.remove('open'));
      if (!isOpen) el.classList.add('open');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.widget-color-dot') && !e.target.closest('.color-picker-pop')) {
        document.querySelectorAll('.color-picker-pop.open').forEach(el => el.classList.remove('open'));
      }
    });

    /* === MISE A JOUR DES DONNEES === */
    function setTitle(id, val) {
      const w = widgets.find(x => x.id === id);
      if (w) w.title = val.toUpperCase();
    }

    function updateModalTitle(val) {
      if (currentModalWidget) currentModalWidget.title = val.toUpperCase();
    }

    function updateRowData(id, i, field, val, mode) {
      const target = (mode === true || mode === 'modal') ? currentModalWidget :
        (mode === 'detail') ? currentDetailWidget :
          widgets.find(x => x.id === id);
      if (target && target.rows[i]) target.rows[i][field] = val;
      if (mode === 'grid' || mode === false || !mode) renderCalendar();
    }

    function addNewRow(id, mode) {
      const target = (mode === true || mode === 'modal') ? currentModalWidget :
        (mode === 'detail') ? currentDetailWidget :
          widgets.find(x => x.id === id);
      if (!target) return;

      target.rows.push({ task: '', desc: '', member: '', date: '', done: false });
      const suffix = (mode === true || mode === 'modal') ? '-modal' :
        (mode === 'detail') ? '-detail' : '';
      const tbody = document.getElementById(`rows-${id}${suffix}`);
      if (!tbody) return;

      const i = target.rows.length - 1;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><input type="checkbox" class="task-checkbox" onchange="updateRowData(${id},${i},'done',this.checked, '${mode}')"></td>
    <td><input class="task-input" value="" placeholder="Tâche" onchange="updateRowData(${id},${i},'task',this.value, '${mode}')"></td>
    <td><input class="task-input" value="" placeholder="Description" onchange="updateRowData(${id},${i},'desc',this.value, '${mode}')"></td>
    <td><input class="task-input" value="" placeholder="Membre" onchange="updateRowData(${id},${i},'member',this.value, '${mode}')"></td>
    <td><input class="task-input" type="date" style="width:110px" onchange="updateRowData(${id},${i},'date',this.value, '${mode}')"></td>`;
      tbody.appendChild(tr);
    }

    function updateText(id, val) {
      const w = widgets.find(x => x.id === id);
      if (w) w.text = val;
    }

    function updateModalText(val) {
      if (currentModalWidget) currentModalWidget.text = val;
    }

    function updateDetailTitle(val) {
      if (currentDetailWidget) currentDetailWidget.title = val.toUpperCase();
    }

    function updateDetailText(val) {
      if (currentDetailWidget) currentDetailWidget.text = val;
    }

    /* === DETAIL OVERLAY FUNCTIONS === */
    let currentDetailWidget = null;

    function openDetailOverlay(id) {
      const w = widgets.find(x => x.id === id);
      if (!w) return;

      currentDetailWidget = JSON.parse(JSON.stringify(w));

      document.getElementById('detail-overlay').classList.add('open');
      renderDetailPreview();
    }

    function renderDetailPreview() {
      if (!currentDetailWidget) return;
      const container = document.getElementById('detail-widget-preview');
      container.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'widget-card';
      card.style.boxShadow = 'none';
      card.style.cursor = 'default';
      card.innerHTML = buildWidgetHTML(currentDetailWidget, 'detail');
      container.appendChild(card);

      const textarea = card.querySelector('.text-widget-area');
      if (textarea) {
        setTimeout(() => resizeTextarea(textarea), 0);
      }
    }

    function closeDetailModal(save) {
      if (save && currentDetailWidget) {
        const idx = widgets.findIndex(w => w.id === currentDetailWidget.id);
        if (idx !== -1) {
          widgets[idx] = currentDetailWidget;
          renderWidgets();
          renderCalendar();
        }
      }
      currentDetailWidget = null;
      document.getElementById('detail-overlay').classList.remove('open');
    }

    // Close overlays on clicking background
    document.getElementById('widget-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('widget-overlay')) closeModal(false);
    });
    document.getElementById('detail-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('detail-overlay')) closeDetailModal(false);
    });

    /* === NAVIGATION === */
    function switchTab(tab, el) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'dashboard');
      document.getElementById('view-calendar').classList.toggle('hidden', tab !== 'calendar');
      if (tab === 'calendar') renderCalendar();
    }

    function shiftMonth(delta) {
      calMonth += delta;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    }

    function goToToday() {
      calYear = new Date().getFullYear();
      calMonth = new Date().getMonth();
      renderCalendar();
    }

    /* === CALENDRIER === */
    function renderCalendar() {
      const DAYS = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
      const MONTHS = ['JANVIER', 'FÉVRIER', 'MARS', 'AVRIL', 'MAI', 'JUIN', 'JUILLET', 'AOÛT', 'SEPTEMBRE', 'OCTOBRE', 'NEMBRE', 'DÉCEMBRE'];
      document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;
      const grid = document.getElementById('cal-grid');
      const today = new Date();
      const tasks = getAllTasks();

      const first = new Date(calYear, calMonth, 1);
      let startDow = first.getDay();
      startDow = startDow === 0 ? 6 : startDow - 1;
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const daysInPrev = new Date(calYear, calMonth, 0).getDate();

      let html = DAYS.map(d => `<div class="cal-day-name">${d}</div>`).join('');

      for (let i = 0; i < startDow; i++) {
        const day = daysInPrev - startDow + 1 + i;
        html += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
        const dayTasks = tasks.filter(t => t.date === dateStr);

        const chips = dayTasks.slice(0, 3).map(t => `<div class="cal-task-chip" style="border-left-color:${t.color};">${t.task || '—'}</div>`).join('');
        const more = dayTasks.length > 3 ? `<div style="font-size:11px;font-weight:bold;margin-top:4px">+${dayTasks.length - 3}</div>` : '';

        html += `<div class="cal-day${isToday ? ' today' : ''}"><div class="cal-day-num">${d}</div>${chips}${more}</div>`;
      }

      const total = startDow + daysInMonth;
      const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let i = 1; i <= remain; i++) {
        html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
      }

      grid.innerHTML = html;
    }

    /* === INITIALISATION === */
    widgetCounter++;
    const w0 = {
      id: widgetCounter,
      type: 'table',
      color: COLORS[0],
      title: 'PROJET ALPHA',
      rows: [
        { task: 'Maquette UI', desc: 'Wireframes', member: 'Camille', date: '2026-06-23', done: false },
        { task: 'API REST', desc: 'Endpoints auth', member: 'Thomas', date: '2026-06-25', done: true },
        { task: 'Tests E2E', desc: 'Playwright', member: 'Léa', date: '2026-06-28', done: false }
      ]
    };

    widgetCounter++;
    const w1 = {
      id: widgetCounter,
      type: 'text',
      color: COLORS[1],
      title: 'NOTES DE RÉUNION',
      text: 'Réunion de lancement\n\n- Définir les priorités du sprint 1\n- Valider les maquettes\n- Planifier la revue de code'
    };

    widgets.push(w0, w1);
    renderWidgets();
  </script>
</body>

</html>
